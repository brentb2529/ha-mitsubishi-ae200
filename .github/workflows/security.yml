---
name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pip-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit manifest requirements
        run: |
          # Extract requirements from manifest.json and audit them
          python - <<'EOF'
          import json, subprocess, sys
          with open("custom_components/ae200/manifest.json") as f:
              data = json.load(f)
          reqs = data.get("requirements", [])
          if not reqs:
              print("No requirements to audit.")
              sys.exit(0)
          with open("_manifest_reqs.txt", "w") as f:
              f.write("\n".join(reqs) + "\n")
          EOF
          if [ -f _manifest_reqs.txt ]; then
            pip-audit -r _manifest_reqs.txt --desc on || true
          fi
      - name: Audit test requirements
        run: |
          if [ -f requirements-test.txt ]; then
            pip-audit -r requirements-test.txt --desc on || true
          fi

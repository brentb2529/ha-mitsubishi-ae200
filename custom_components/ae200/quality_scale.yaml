rules:
  # Bronze rules
  action-exceptions:
    status: exempt
    comment: >
      This integration defines no custom HA services/actions.
  appropriate-polling:
    status: done
  brands:
    status: todo
    comment: >
      Brand icons (icon.png, icon@2x.png, logo.png) need to be submitted to
      the Home Assistant brands repository.  Local brand directory in
      custom_components/ae200/brand/ requires HA >= 2026.3.
  common-modules:
    status: done
  config-flow:
    status: done
  config-flow-test-coverage:
    status: done
    comment: >
      Config flow, options flow, and reconfigure flow tested in
      tests/test_config_flow.py using pytest-homeassistant-custom-component
      and the fake WebSocket server fixture.
  dependency-transparency:
    status: done
    comment: >
      Single dependency: websockets>=12.0 (PyPI, open source, MIT/BSD).
  docs-actions:
    status: exempt
    comment: No custom actions/services defined.
  docs-high-level-description:
    status: done
    comment: README.md provides overview, entities, and setup.
  docs-installation-instructions:
    status: done
  docs-removal-instructions:
    status: done
  entity-event-setup:
    status: exempt
    comment: No push events; coordinator is polling-only.
  entity-unique-id:
    status: done
  has-entity-name:
    status: done
  test-before-configure:
    status: done
    comment: Config flow tests connectivity before creating the entry.
  test-before-setup:
    status: done
    comment: async_config_entry_first_refresh raises ConfigEntryNotReady on failure.
  unique-config-entry:
    status: done
    comment: Unique ID is the lowercased host; duplicates are aborted.

  # Silver rules (not targeted yet)
  async-dependency:
    status: todo
    comment: >
      The websockets library is async.  No blocking I/O on the event loop.
      Full audit needed for silver.
  dynamic-devices:
    status: todo
    comment: >
      Groups are discovered at setup time and cached.  Dynamic add/remove of
      groups (after the controller is reconfigured) requires a reload.  Silver
      requires dynamic entity registration without a reload.
  entity-category:
    status: done
    comment: >
      Diagnostic EntityCategory applied to outdoor temp, filter, and error sensors.
  entity-device-class:
    status: done
  entity-translations:
    status: done
  exception-translations:
    status: todo
    comment: Error strings are English-only; translation keys needed for silver.
  icon-translations:
    status: todo
  log-when-unavailable:
    status: todo
  parallel-updates:
    status: todo
    comment: >
      Coordinator pattern serializes all reads.  Set PARALLEL_UPDATES = 1 on
      each platform to prevent concurrent set-calls during HA batch updates.
  reauthentication-flow:
    status: exempt
    comment: >
      AE-200E LAN1 API is unauthenticated; no credentials to re-authenticate.
  reconfigure-flow:
    status: done
    comment: >
      async_step_reconfigure allows host/IP change without removing the entry.
      Uses async_update_reload_and_abort; validates new host before applying.
  repair-issues:
    status: todo
  stale-devices:
    status: todo
    comment: >
      Devices removed from the controller are not pruned from the device
      registry automatically.

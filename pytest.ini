[pytest]
asyncio_mode = auto
testpaths = tests
log_cli = true
log_cli_level = WARNING
# Disable the phcc pytest plugin (Python 3.14 annotation-eval incompatibility in
# plugins.py). We still import from pytest_homeassistant_custom_component.common
# directly in tests/flow/conftest.py — only the pytest11 entry-point plugin breaks.
addopts = -p no:homeassistant
